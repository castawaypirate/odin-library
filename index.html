<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Odin Library</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <dialog id="book-form-dialog">
      <form id="book-form">
        <input type="text" id="id" name="id" value="" readonly />
        <div class="form-field">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" value="" required />
        </div>
        <div class="form-field">
          <label for="author">Author</label>
          <input type="text" id="author" name="author" value="" />
        </div>
        <div class="form-field">
          <label for="pages">Pages</label>
          <input type="tel" id="pages" name="pages" value="" />
        </div>
        <div class="form-field">
          <label for="readStatus">Read Status</label>
          <select name="readStatus" id="readStatus">
            <option value="">--Please choose read status--</option>
            <option value="Read">Read</option>
            <option value="Unread">Unread</option>
            <option value="Reading">Reading</option>
          </select>
        </div>
      </form>
      <div class="form-buttons">
        <button type="submit" id="submit-button" form="book-form">
          Submit
        </button>
        <button commandfor="book-form-dialog" command="close">Close</button>
      </div>
    </dialog>

    <table>
      <caption>
        Odin Library
      </caption>
      <thead>
        <tr>
          <!-- <th scope="col">ID</th> -->
          <th scope="col">Title</th>
          <th scope="col">Author</th>
          <th scope="col">Pages</th>
          <th scope="col">Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="add-book">Add book</button>
  </body>
</html>
